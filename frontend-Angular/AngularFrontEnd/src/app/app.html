<style>
</style>

<main class="main">
  <header>
    <section class="headerSec">
    <div><img src="/Icons/UEventos.png" alt="Logo de U events" ></div>
    <div><h1>Nuevo Evento</h1></div>
    <div><img src="/Icons/profile.png" alt="perfil"></div>
    </section>
  </header>
  
<div>
  <div class="form-row">
    <div class="input-group">
      <label for="eventName">Nombre del evento</label>
      <input type="text" id="eventName" placeholder="Nombre...">
    </div>
    <div class="input-group">
      <label for="eventLocation">Lugar</label>
      <input type="text" id="eventLocation" placeholder="Lugar del evento...">
    </div>
  </div>

  <div class="form-row">
    <div class="input-group">
      <label for="eventType">Tipo de evento</label>
      <select id="eventType">
        <option>Tipo de evento</option>
        <option>Academico</option>
        <option>Ludico</option>
      </select>
    </div>
    <div class="input-group">
      <label for="responsibleId">Id del responsable</label>
      <input type="text" id="responsibleId" placeholder="Identificación del responsable">
    </div>
  </div>

  <div class="form-row form-row--last">
    <div class="input-group">
      <label for="eventDate">Fecha</label>
      <input type="text" id="eventDate" placeholder="xxxx/xx/xx">
    </div>
    <div class="input-group">
      <label for="eventDate">Hora de Inicio</label>
      <input type="text" id="EVHourIni" placeholder="XX:XX">
      <label for="eventDate">Hora de Fin</label>
      <input type="text" id="EVHourFin" placeholder="XX:XX">
    </div>
    
    <div class="input-group">
      <div class="label-status">Estado del evento</div>
      <div class="status-button">Borrador</div>
    </div>
  </div>

  <div class="form-grid">
    <div class="upload-container">
      <p>Aval (PDF)</p>
      <div class="upload-box">
        <img src="assets/images/plus_square.png" alt="Upload Icon">
      </div>
    </div>

    <div class="external-org">
      <div class="external-org-header">
        <label for="externalOrgName">Organización externa</label>
      </div>
      <div class="input-group">
        <label for="externalOrgName">Nombre:</label>
        <input type="text" id="externalOrgName">
      </div>
      <div class="input-group">
        <label for="externalOrgNit">Nit:</label>
        <input type="text" id="externalOrgNit">
      </div>
      <div class="icon-buttons">
        <button class="icon-button"><img src="assets/images/form.png" alt="Form Icon"></button>
        <button class="icon-button"><img src="assets/images/message.png" alt="Message Icon"></button>
      </div>
    </div>
  </div>

  <div class="checkbox-group">
    <input type="checkbox" id="externalOrgParticipation">
    <label for="externalOrgParticipation">¿Participa una organización externa?</label>
  </div>

  <button class="submit-button">Mandar a revisión</button>
</div>

<router-outlet></router-outlet>
</main>
